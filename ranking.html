<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>퀀트스코프 - 추천순위</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell ranking-shell">
      <header class="topbar ranking-topbar">
        <div>
          <h1>추천순위</h1>
          <p>NASDAQ 50 기준 추천 점수</p>
        </div>
        <a href="index.html" class="ranking-link-btn">메인으로</a>
      </header>

      <section class="panel ranking-main-panel">
        <div class="ranking-controls">
          <div class="timeframe-buttons" id="ranking-timeframe-buttons">
            <button id="ranking-tf-4h" type="button" class="timeframe-btn">4시간봉</button>
            <button id="ranking-tf-1d" type="button" class="timeframe-btn active">일봉</button>
            <button id="ranking-tf-1w" type="button" class="timeframe-btn">주봉</button>
          </div>
          <button id="ranking-refresh-btn" type="button" class="secondary-btn inline-btn">순위 계산</button>
          <span id="ranking-status" class="source-pill">준비</span>
        </div>
        <ol id="ranking-page-list" class="ranking-page-list"></ol>
      </section>
    </div>

    <script src="ranking.js"></script>
  </body>
</html>
